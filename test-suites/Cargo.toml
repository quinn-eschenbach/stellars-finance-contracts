name = "liquidation_cascade"
path = "integration/liquidation_cascade.rs"

[[test]]
name = "admin_operations"
path = "integration/admin_operations.rs"

[[test]]
name = "error_paths"
path = "integration/error_paths.rs"

[[test]]
name = "attack_vectors"
path = "integration/attack_vectors.rs"

[[test]]
