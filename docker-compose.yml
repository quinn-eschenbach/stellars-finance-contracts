services:
  stellar:
    image: stellar/quickstart:testing
    container_name: stellar-local
    command: --local --enable-soroban-rpc
    ports:
      - "8000:8000"
    # Healthy = soroban-rpc is reachable AND Stellar Core is producing
    # ledgers (sequence > 0). When this passes, friendbot is ready to fund
    # accounts too, since both depend on Core having bootstrapped.
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS -X POST http://localhost:8000/soroban/rpc
          -H 'Content-Type: application/json'
          -d '{"jsonrpc":"2.0","id":1,"method":"getLatestLedger"}'
          | grep -q '"sequence":[1-9]'
      interval: 3s
      timeout: 3s
      retries: 60
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: stellars-postgres
    environment:
      POSTGRES_USER: stellars
      POSTGRES_PASSWORD: stellars
      POSTGRES_DB: stellars
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellars"]
      interval: 3s
      timeout: 2s
      retries: 10

volumes:
  pgdata:
