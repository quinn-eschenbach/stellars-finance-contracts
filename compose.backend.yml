# compose.backend.yml — production-style backend stack: Postgres + the
# three off-chain services + frontend served by api.
#
#   docker compose -f compose.backend.yml --env-file .env.local up
#
# `--env-file` populates the ${...} substitutions below; the per-service
# `env_file:` directive then loads the same file's contents *into* each
# container. We override DATABASE_URL via `environment:` so services find
# Postgres at its compose hostname (`postgres`) regardless of what the
# shell .env says about localhost.
#
# Runtime stack here is intentionally separate from `docker-compose.yml`
# (which spins up stellar-quickstart for local chain). The chain is treated
# as an external dependency — local quickstart, testnet, mainnet, all the
# same to this compose.

# Shared log driver caps. Without these every service grows an unbounded
# JSON log file on the host — fine for a day, painful at a year.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: stellars
      # Refuse to start without an explicit DB password — a hardcoded
      # default would be a foot-gun in any shared env.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set in .env.<network>}
      POSTGRES_DB: stellars
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellars"]
      interval: 3s
      timeout: 2s
      retries: 20
    # Per-service resource limits so a runaway query / OOM-y service cannot
    # starve siblings on a single-host deploy.
    mem_limit: 2g
    cpus: 2.0
    pids_limit: 200
    # No host port mapping by default — services reach it via the compose
    # network. Uncomment to expose for psql debugging.
    # ports:
    #   - "5432:5432"

  # One-shot drizzle migration runner. Reuses the indexer's `build` stage
  # (which has pnpm + drizzle-kit + the migrations under packages/db/drizzle).
  # `restart: "no"` so the container exits after migrations apply; downstream
  # services gate on `service_completed_successfully`. drizzle migrations are
  # idempotent so re-running on an already-up DB is a no-op.
  migrate:
    build:
      context: .
      dockerfile: docker/indexer.Dockerfile
      target: build
    restart: "no"
    logging: *default-logging
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      DATABASE_URL: postgresql://stellars:${POSTGRES_PASSWORD:?must be set in .env.<network>}@postgres:5432/stellars
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "--filter", "@stellars/db", "migrate"]

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        # These flow into the frontend's `vite build` step. Coolify maps them
        # from "Build-time" environment variables on the service.
        VITE_NETWORK: ${VITE_NETWORK:-local}
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      # Override DB URL so the service uses the compose hostname even if
      # the source .env points at localhost.
      DATABASE_URL: postgresql://stellars:${POSTGRES_PASSWORD:?must be set in .env.<network>}@postgres:5432/stellars
      API_PORT: "3030"
      # CORS origins must be explicit on shared / production envs. Local
      # dev gets a permissive default via the substitution; testnet /
      # mainnet operators set API_CORS_ORIGINS in .env.<network>.
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-*}
      STATIC_ROOT: /app/public
    ports:
      - "${API_PORT:-3030}:3030"
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 200
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3030/api/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  indexer:
    build:
      context: .
      dockerfile: docker/indexer.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      DATABASE_URL: postgresql://stellars:${POSTGRES_PASSWORD:?must be set in .env.<network>}@postgres:5432/stellars
      HEALTH_PORT: "3001"
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 200
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  keeper:
    build:
      context: .
      dockerfile: docker/keeper.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      DATABASE_URL: postgresql://stellars:${POSTGRES_PASSWORD:?must be set in .env.<network>}@postgres:5432/stellars
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
