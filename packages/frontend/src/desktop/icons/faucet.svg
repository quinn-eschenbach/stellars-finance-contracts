<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- 32x32 pixel-art water tap in the Win95 16-color palette.
       Black silhouette first, chrome fills inset by 1px on top. -->
  <!-- silhouette -->
  <rect x="10" y="2" width="14" height="5" fill="#000000"/>
  <rect x="15" y="6" width="4" height="4" fill="#000000"/>
  <rect x="7" y="9" width="20" height="9" fill="#000000"/>
  <rect x="26" y="11" width="6" height="5" fill="#000000"/>
  <rect x="3" y="10" width="5" height="9" fill="#000000"/>
  <!-- handle -->
  <rect x="11" y="3" width="12" height="3" fill="#c0c0c0"/>
  <rect x="11" y="3" width="12" height="1" fill="#ffffff"/>
  <rect x="11" y="5" width="12" height="1" fill="#808080"/>
  <rect x="16" y="7" width="2" height="2" fill="#c0c0c0"/>
  <!-- body -->
  <rect x="8" y="10" width="18" height="7" fill="#c0c0c0"/>
  <rect x="8" y="10" width="18" height="1" fill="#ffffff"/>
  <rect x="8" y="16" width="18" height="1" fill="#808080"/>
  <!-- wall pipe -->
  <rect x="27" y="12" width="5" height="3" fill="#c0c0c0"/>
  <rect x="27" y="12" width="5" height="1" fill="#ffffff"/>
  <rect x="27" y="14" width="5" height="1" fill="#808080"/>
  <!-- spout mouth -->
  <rect x="4" y="11" width="3" height="7" fill="#c0c0c0"/>
  <rect x="4" y="11" width="1" height="7" fill="#ffffff"/>
  <rect x="6" y="11" width="1" height="7" fill="#808080"/>
  <!-- drip + drop -->
  <rect x="5" y="20" width="1" height="2" fill="#00ffff"/>
  <rect x="4" y="23" width="3" height="4" fill="#0000a8"/>
  <rect x="4" y="24" width="1" height="2" fill="#00ffff"/>
  <rect x="5" y="23" width="1" height="1" fill="#00ffff"/>
</svg>
